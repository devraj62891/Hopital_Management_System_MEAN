<div class="dashboard-wrapper">
  <aside class="dashboard-nav">
    <div class="nav-brand">
      <span class="brand-icon">🏥</span>
      <span class="brand-text">MediCare</span>
    </div>

    <div class="nav-links">
      <a routerLink="profile" routerLinkActive="active" class="nav-item">
        <span class="icon">👤</span>
        <span class="label">Profile</span>
      </a>
      <a routerLink="book" routerLinkActive="active" class="nav-item">
        <span class="icon">📅</span>
        <span class="label">Book Appointment</span>
      </a>
      <a routerLink="appointments" routerLinkActive="active" class="nav-item">
        <span class="icon">📋</span>
        <span class="label">My Appointments</span>
      </a>
    </div>

    <button class="btn-logout" (click)="logout()">
      <span class="icon">🚪</span>
      <span class="label">Logout</span>
    </button>
  </aside>

  <main class="dashboard-main">
    <header class="dashboard-header animate-in">
      <h2>Welcome, {{ patient?.firstName || "User" }}</h2>
      <div class="header-line"></div>
    </header>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
