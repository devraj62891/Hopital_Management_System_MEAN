<div class="dashboard-wrapper">
  <aside class="dashboard-nav">
    <div class="nav-brand">
      <span class="brand-icon">🏥</span> <span class="brand-text">MediCare</span>
    </div>

    <div class="nav-links">
      <a routerLink="appointment" routerLinkActive="active" class="nav-item">
        <span class="icon">📅</span>
        <span class="label">Appointments</span>
      </a>
      <a routerLink="availability" routerLinkActive="active" class="nav-item">
        <span class="icon">🕒</span>
        <span class="label">Availability</span>
      </a>
      <a routerLink="patients" routerLinkActive="active" class="nav-item">
        <span class="icon">📋</span>
        <span class="label">Appointment History</span>
      </a>
    </div>

    <button class="btn-logout" (click)="logout()">
      <span class="icon">🚪</span>
      <span class="label">Logout</span>
    </button>
  </aside>

  <main class="dashboard-main">
    <header class="dashboard-header animate-in">
      <h2>Welcome, {{ doctor?.name || "Doctor" }}</h2>
      <div class="header-line"></div>
    </header>

    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
