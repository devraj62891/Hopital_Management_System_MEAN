<div class="appointment-wrapper">
  <div class="appointment-header animate-in">
    <h3 class="section-title">Treatment Details</h3>
    <p class="section-sub">Record medical history and the treatment plan for <strong>{{ patientName }}</strong>.</p>
  </div>

  <div class="appointment-container animate-in">
    
    <div class="step-section">
      <label class="step-label">1. Diagnosis</label>
      <input 
        type="text" 
        class="modern-input" 
        [(ngModel)]="formData.diagnosis" 
        placeholder="E.g., Acute Bronchitis" 
        required 
      />
    </div>

    <div class="step-section animate-in" style="animation-delay: 0.1s;">
      <label class="step-label">2. Treatment Plan</label>
      <input 
        type="text" 
        class="modern-input" 
        [(ngModel)]="formData.treatment" 
        placeholder="E.g., Prescribed antibiotics, rest for 5 days" 
        required 
      />
    </div>

    <div class="step-section animate-in" style="animation-delay: 0.2s;">
      <label class="step-label">3. Additional Notes</label>
      <textarea 
        class="modern-textarea" 
        [(ngModel)]="formData.notes" 
        placeholder="Any allergies, follow-up instructions, or observations..."
      ></textarea>
    </div>

    <div class="form-actions animate-in" style="animation-delay: 0.3s;">
      <button 
        class="submit-btn" 
        (click)="submitForm()" 
        [disabled]="!formData.diagnosis || !formData.treatment">
        Save Medical History
      </button>
    </div>

  </div>
</div>
